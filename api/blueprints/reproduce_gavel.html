<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #111827; color: #e5e7eb; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-xl mx-auto">
        
        <!-- Case 1: First. Unlawful aggression; -->
        <div class="mb-4 relative group">
            <p class="!m-0 whitespace-pre-wrap" style="padding-left: 3.6rem; text-indent: -2.1rem; max-width: none;">
                First. Unlawful aggression;
                <span class="inline-flex items-center gap-1 ml-1 cursor-pointer text-indigo-400 hover:text-indigo-300 transition-colors align-baseline">
                    <i class="fa-solid fa-gavel text-[14px]"></i>
                    <span class="text-xs font-semibold">101</span>
                </span>
            </p>
        </div>

        <!-- Case 2: Second. Reasonable necessity... -->
        <div class="mb-4 relative group">
            <p class="!m-0 whitespace-pre-wrap" style="padding-left: 3.6rem; text-indent: -2.1rem; max-width: none;">
                Second. Reasonable necessity of the means employed to prevent or repel it;
                <span class="inline-flex items-center gap-1 ml-1 cursor-pointer text-indigo-400 hover:text-indigo-300 transition-colors align-baseline">
                    <i class="fa-solid fa-gavel text-[14px]"></i>
                    <span class="text-xs font-semibold">9</span>
                </span>
            </p>
        </div>

    </div>
</body>
</html>
